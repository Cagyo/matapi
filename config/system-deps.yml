# System packages installed at install time keyed by feature.
# Read by scripts/install.sh.

# Desired Node.js major version. Minor/patch upgrades within this major are
# applied automatically by /system_update; a major change requires manual
# intervention (spec 18 / spec 24).
node: "20"

core:
  apt:
    - git
    - sqlite3
    - libsqlite3-dev
    - build-essential
    - python3
    - python3-setuptools
    # pigpio & python3-pigpio are installed via apt when available (Debian < 12),
    # or built from source automatically by scripts/install.sh on modern OSes.

motion:
  apt:
    - motion
    - ffmpeg
  scripts:
    - "curl https://rclone.org/install.sh | sudo bash"

uart:
  raspi-config:
    - "do_serial 2"

zigbee:
  apt:
    - mosquitto
    - mosquitto-clients

cellular:
  apt:
    - usb-modeswitch
