# System packages installed at install time keyed by feature.
# Read by scripts/install.sh.

# Desired Node.js major version. `/system_update` applies apt/rclone updates
# automatically and reports Node major mismatches with manual upgrade
# instructions (spec 18 / spec 24).
node: "20"

core:
  apt:
    - git
    - sqlite3
    - libsqlite3-dev
    - build-essential
    - python3
    - python3-setuptools
    # pigpio & python3-pigpio are installed via apt when available (Debian < 12),
    # or built from source automatically by scripts/install.sh on modern OSes.

motion:
  apt:
    - motion
    - ffmpeg
  scripts:
    - "curl https://rclone.org/install.sh | sudo bash"

# Explicit opt-in for the restricted RTSP converter and Quick Tunnel view.
rtsp:
  apt:
    - ffmpeg
    - nftables
    - policykit-1
    - cloudflared

uart:
  raspi-config:
    - "do_serial_cons 1"
    - "do_serial_hw 0"

zigbee:
  apt:
    - mosquitto
    - mosquitto-clients

cellular:
  apt:
    - usb-modeswitch
